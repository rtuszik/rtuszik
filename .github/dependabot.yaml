---
version: 2
updates:
    # Update Python packages
    - package-ecosystem: "pip"
      directory: "/"
      schedule:
        interval: "weekly"
      open-pull-requests-limit: 10
      cooldown:
        default-days: 7

    # Update GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
      open-pull-requests-limit: 10
      cooldown:
        default-days: 7
